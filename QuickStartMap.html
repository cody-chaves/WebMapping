<!DOCTYPE html>
<html>

  <head>
    <meta charset='utf-8' />
    <title>University of Oregon Mapping</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <!--    Include the reference to the Mapbox JavaScript here in the <head> of the page  (Part I.1)  -->
    
     <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>


    <!--    Include the reference to the Mapbox CSS here in between <head> tags    (Part I.2) -->

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">

    <style>
        /* Insert the additional CSS code here between the <style> tags  (Part I.4)   */
          #map { position:absolute; top:0; bottom:0; width:100%; }

          #banner { z-index: 9999; 
         background-color: lightblue; 
         opacity: 80%; 
         text-align: center 
        }
    

    </style>
  </head>

  <body>
    <!--  Insert the map div here in the <body> of the page  (Part I)  -->
    <div id='map'></div>
    <!--  Insert the title div here (part VI) -->
    <div id='title'>University of Oregon Mapping</div> 
    
    <div id='banner'>
     		<h1>My First WebMap of Portland Oregon</h1>
     		<h2>By: Cody Chaves</h2>
 	</div>

    <script>
        // Insert the JavaScript within the <script> tags, within the body   
        // Start with the Mapbox access token here (Part 2.1)
 
         mapboxgl.accessToken = 'pk.eyJ1IjoiY29keS1jaGF2ZXMiLCJhIjoiY21ucGt6ZHpnMTZybDJycHM1NncyNG9vNCJ9.QfVioBAE6Vct8fnDl16iqg'; //  Put your access token between the single quotes.
   
        // Then initialize the map here (Part 2.2)

         var map = new mapboxgl.Map({
            container: 'map', // id of a div on your page, where the map will be inserted
            style: 'mapbox://styles/mapbox/navigation-day-v1', // stylesheet location
            center: [-122.6788, 45.5212], // starting position [lng, lat] eg. [-122.6788, 45.5212]
            zoom: 11 // starting zoom 
          });


        // Add the zoom contols here (part V)

        //  map.addControl(new mapboxgl.NavigationControl());

          map.addControl(new mapboxgl.NavigationControl({
          showCompass: false
          }), 'bottom-left');
   
        // Add popups for markers here. Yes, before the markers!  (part IV)

        var popup = new mapboxgl.Popup({ offset: 25 })
          .setHTML('Hello World. Welcome to Portland!');

        var popup2 = new mapboxgl.Popup({ offset: 25 })
          .setHTML('<a href="https://www.japanesegarden.org">Japanese Garden</a>');

        //  var marker = new mapboxgl.Marker()
        //   .setLngLat([-122.6788, 45.5212])
        //   .addTo(map); // add the open marker to the map

           var popup_layer = new mapboxgl.Popup({closeOnClick: true, anchor: 'top-right'}) 
            .setLngLat([-122.64, 45.5]) //popup coordinates
            .setHTML('<a href="https://www.voodoodoughnut.com">voodoo donuts</a>') //popup text
            .addTo(map); //add this popup to the map!
        
        // Add any other variables such as markers here (part III)

          var marker = new mapboxgl.Marker({color:'green'})
          .setLngLat([-122.6788, 45.5212]) // starting position [lng, lat]
          .setPopup(popup) //add the popup with the variable name 'popup' to this marker 
          .addTo(map);

         var marker2 = new mapboxgl.Marker({color:'red'})
         .setLngLat([-122.69, 45.55]) // starting position [lng, lat] 
         .addTo(map);

         var marker3 = new mapboxgl.Marker({color:'blue'})
          .setLngLat([-122.707931, 45.518719]) // starting position [lng, lat]
          .setPopup(popup2) //add the popup with the variable name 'popup' to this marker 
          .addTo(map);


        // Add optional advanced "On load" function here
        
    </script>

  </body>

</html>
